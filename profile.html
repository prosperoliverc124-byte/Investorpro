<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profile — InvestorPro</title>
    <link rel="icon" href="https://i.postimg.cc/j5dLBnvw/Minimalist-logo-for-202603191648.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        a, button, input, select {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .press { transition: transform 0.15s ease; }
        .press:active { transform: scale(0.95); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* TOP BAR */
        .page-bar {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }

        .page-back {
            width: 36px; height: 36px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
            font-size: 16px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .page-title {
            flex: 1;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .page-spacer {
            width: 36px;
            flex-shrink: 0;
        }

        /* CONTENT */
        .page-content {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeUp 0.5s ease;
        }

        /* PROFILE CARD */
        .profile-top {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 74px; height: 74px;
            border-radius: 50%;
            background: #1a56cc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
        }

        .profile-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 14px;
        }

        .profile-badge {
            display: inline-block;
            padding: 6px 14px;
            background: #f0fdf4;
            color: #10b981;
            font-size: 12px;
            font-weight: 700;
            border-radius: 20px;
        }

        /* FORM CARD */
        .form-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .form-field {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-icon-left {
            position: absolute;
            left: 14px;
            color: #9ca3af;
            font-size: 15px;
            pointer-events: none;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: #f8fafc;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #1a1a2e;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        .form-input:focus {
            border-color: #1a56cc;
            background: #fff;
        }

        .form-input::placeholder { color: #c0c7d0; }

        .readonly {
            opacity: 0.8;
        }

        .ref-box {
            display: flex;
            gap: 10px;
        }

        .ref-box .form-input {
            flex: 1;
        }

        .copy-btn {
            padding: 0 16px;
            background: #1a56cc;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: #1a56cc;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .save-btn:hover { background: #1545a8; }

        .logout-btn {
            width: 100%;
            padding: 15px;
            background: #fef2f2;
            color: #dc2626;
            border: none;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .msg {
            display: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .msg.success {
            background: #f0fdf4;
            color: #16a34a;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 14px;
            border-top: 1px solid #f0f0f0;
            z-index: 1000;
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            padding: 4px 12px;
        }

        .nav-tab i { font-size: 20px; color: #9ca3af; }
        .nav-tab span { font-size: 10px; font-weight: 600; color: #9ca3af; }
        .nav-tab.active i { color: #1a56cc; }
        .nav-tab.active span { color: #1a56cc; }
        .nav-tab:active { transform: scale(0.9); }

        @media (min-width: 769px) {
            .page-content { max-width: 480px; }
            .bottom-nav {
                max-width: 500px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 20px 20px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            }
            .page-bar { max-width: 500px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">Copied!</div>

    <div class="page-bar">
        <a href="dashboard.html" class="page-back press"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title">Profile</div>
        <div class="page-spacer"></div>
    </div>

    <div class="page-content">
        <div class="profile-top">
            <div class="profile-avatar" id="profileAvatar">P</div>
            <div class="profile-name" id="profileName">Prosper</div>
            <div class="profile-email" id="profileEmail">prosper@example.com</div>
            <div class="profile-badge"><i class="fas fa-check-circle"></i> Verified Account</div>
        </div>

        <div class="form-card">
            <div class="section-title">Personal Information</div>
            <div class="msg success" id="successMsg">Profile updated successfully!</div>

            <div class="form-field">
                <label class="form-label">Full Name</label>
                <div class="form-input-wrap">
                    <i class="fas fa-user form-icon-left"></i>
                    <input type="text" class="form-input" id="fullName">
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Email Address</label>
                <div class="form-input-wrap">
                    <i class="fas fa-envelope form-icon-left"></i>
                    <input type="email" class="form-input readonly" id="email" readonly>
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Phone Number</label>
                <div class="form-input-wrap">
                    <i class="fas fa-phone form-icon-left"></i>
                    <input type="tel" class="form-input readonly" id="phone" readonly>
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Referral Link</label>
                <div class="ref-box">
                    <div class="form-input-wrap" style="flex:1;">
                        <i class="fas fa-link form-icon-left"></i>
                        <input type="text" class="form-input readonly" id="refLink" readonly>
                    </div>
                    <button class="copy-btn press" onclick="copyRef()">Copy</button>
                </div>
            </div>

            <button class="save-btn press" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
        </div>

        <div class="form-card">
            <div class="section-title">Bank Details</div>

            <div class="form-field">
                <label class="form-label">Bank Name</label>
                <div class="form-input-wrap">
                    <i class="fas fa-building-columns form-icon-left"></i>
                    <input type="text" class="form-input" id="bankName" placeholder="Enter your bank name">
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Account Number</label>
                <div class="form-input-wrap">
                    <i class="fas fa-hashtag form-icon-left"></i>
                    <input type="tel" class="form-input" id="accountNum" placeholder="Enter account number">
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Account Name</label>
                <div class="form-input-wrap">
                    <i class="fas fa-user form-icon-left"></i>
                    <input type="text" class="form-input" id="accountName" placeholder="Enter account name">
                </div>
            </div>

            <button class="save-btn press" onclick="saveBank()"><i class="fas fa-university"></i> Save Bank Details</button>
        </div>

        <button class="logout-btn press" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-tab"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="deposit.html" class="nav-tab"><i class="fas fa-plus-circle"></i><span>Deposit</span></a>
        <a href="invest.html" class="nav-tab"><i class="fas fa-chart-line"></i><span>Invest</span></a>
        <a href="withdraw.html" class="nav-tab"><i class="fas fa-wallet"></i><span>Withdraw</span></a>
        <a href="profile.html" class="nav-tab active"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <script>
        if (localStorage.getItem('investorpro_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        var stored = localStorage.getItem('investorpro_user');
        if (stored) {
            var user = JSON.parse(stored);

            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();

            document.getElementById('fullName').value = user.name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';

            document.getElementById('bankName').value = user.bankName || '';
            document.getElementById('accountNum').value = user.accountNum || '';
            document.getElementById('accountName').value = user.accountName || '';

            document.getElementById('refLink').value = window.location.origin + '/investorpro/signup.html?ref=' + (user.phone || '');
        }

        function showSuccess() {
            var msg = document.getElementById('successMsg');
            msg.style.display = 'block';
            setTimeout(function() {
                msg.style.display = 'none';
            }, 2000);
        }

        function saveProfile() {
            var stored = localStorage.getItem('investorpro_user');
            if (!stored) return;

            var user = JSON.parse(stored);
            user.name = document.getElementById('fullName').value;

            localStorage.setItem('investorpro_user', JSON.stringify(user));

            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();

            showSuccess();
        }

        function saveBank() {
            var stored = localStorage.getItem('investorpro_user');
            if (!stored) return;

            var user = JSON.parse(stored);
            user.bankName = document.getElementById('bankName').value;
            user.accountNum = document.getElementById('accountNum').value;
            user.accountName = document.getElementById('accountName').value;

            localStorage.setItem('investorpro_user', JSON.stringify(user));

            showSuccess();
        }

        function copyRef() {
            var link = document.getElementById('refLink').value;
            navigator.clipboard.writeText(link).then(function() {
                var toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(function() {
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        function logout() {
            localStorage.setItem('investorpro_logged_in', 'false');
            window.location.href = 'login.html';
        }
    </script>

</body>
  </html>
